name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true
        default: ""

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: foji-api-dev
  APP_RUNNER_SERVICE: foji-api-prod

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm != 'deploy' }}
        run: |
          echo "Deployment cancelled: type 'deploy' to confirm."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to App Runner (create or update)
        env:
          IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          IMAGE_CONFIG='{
            "RuntimeEnvironmentVariables": {
              "ASPNETCORE_ENVIRONMENT": "Production",
              "AWS_SSM_PREFIX": "/foji/prod/",
              "AWS_REGION": "us-east-1"
            },
            "Port": "8080"
          }'

          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ env.APP_RUNNER_SERVICE }}'].ServiceArn" \
            --output text)

          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "Creating new App Runner service..."
            aws apprunner create-service \
              --service-name ${{ env.APP_RUNNER_SERVICE }} \
              --source-configuration '{
                "AuthenticationConfiguration": {
                  "AccessRoleArn": "${{ secrets.APP_RUNNER_ECR_ROLE_ARN }}"
                },
                "AutoDeploymentsEnabled": false,
                "ImageRepository": {
                  "ImageIdentifier": "'"$IMAGE"'",
                  "ImageRepositoryType": "ECR",
                  "ImageConfiguration": '"$IMAGE_CONFIG"'
                }
              }' \
              --instance-configuration '{
                "Cpu": "1 vCPU",
                "Memory": "2 GB",
                "InstanceRoleArn": "${{ secrets.APP_RUNNER_INSTANCE_ROLE_ARN }}"
              }' \
              --health-check-configuration '{
                "Protocol": "HTTP",
                "Path": "/health",
                "Interval": 20,
                "Timeout": 5,
                "HealthyThreshold": 1,
                "UnhealthyThreshold": 3
              }'
          else
            echo "Updating existing App Runner service..."
            aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration '{
                "AuthenticationConfiguration": {
                  "AccessRoleArn": "${{ secrets.APP_RUNNER_ECR_ROLE_ARN }}"
                },
                "AutoDeploymentsEnabled": false,
                "ImageRepository": {
                  "ImageIdentifier": "'"$IMAGE"'",
                  "ImageRepositoryType": "ECR",
                  "ImageConfiguration": '"$IMAGE_CONFIG"'
                }
              }' \
              --instance-configuration '{
                "InstanceRoleArn": "${{ secrets.APP_RUNNER_INSTANCE_ROLE_ARN }}"
              }'
          fi

      - name: Wait for App Runner to stabilize
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ env.APP_RUNNER_SERVICE }}'].ServiceArn" \
            --output text)
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query "Service.Status" --output text)
            echo "Status: $STATUS (attempt $i/30)"
            if [ "$STATUS" = "RUNNING" ]; then
              URL=$(aws apprunner describe-service \
                --service-arn "$SERVICE_ARN" \
                --query "Service.ServiceUrl" --output text)
              echo "## Prod Deployment" >> $GITHUB_STEP_SUMMARY
              echo "**URL**: https://$URL" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            sleep 20
          done
          echo "Deployment timed out" && exit 1
