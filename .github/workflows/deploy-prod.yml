name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true
        default: ""

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: foji-api-prod
  ECS_SERVICE: foji-api-prod
  ECS_CLUSTER: foji-prod

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm != 'deploy' }}
        run: |
          echo "Deployment cancelled: type 'deploy' to confirm."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if missing
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY 2>/dev/null || \
            aws ecr create-repository --repository-name $ECR_REPOSITORY --image-scanning-configuration scanOnPush=true

      - name: Set ECR lifecycle policy
        run: |
          aws ecr put-lifecycle-policy \
            --repository-name $ECR_REPOSITORY \
            --lifecycle-policy-text '{
              "rules": [{
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }]
            }'

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Ensure ECS cluster exists
        run: |
          aws ecs describe-clusters --clusters $ECS_CLUSTER --query "clusters[0].status" --output text 2>/dev/null | grep -q ACTIVE || \
            aws ecs create-cluster --cluster-name $ECS_CLUSTER --capacity-providers FARGATE --default-capacity-provider-strategy capacityProvider=FARGATE,weight=1

      - name: Deploy to ECS Express Mode
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          image: ${{ steps.build-image.outputs.image }}
          execution-role-arn: ${{ secrets.ECS_TASK_EXECUTION_ROLE_ARN }}
          infrastructure-role-arn: ${{ secrets.ECS_INFRASTRUCTURE_ROLE_ARN }}
          task-role-arn: ${{ secrets.APP_RUNNER_INSTANCE_ROLE_ARN }}
          container-port: 8080
          health-check-path: /health
          cpu: 1024
          memory: 2048
          min-task-count: 1
          max-task-count: 8
          auto-scaling-metric: AVERAGE_CPU
          auto-scaling-target-value: 70
          environment-variables: |
            ASPNETCORE_ENVIRONMENT=Production
            AWS_SSM_PREFIX=/foji/prod/
            AWS_REGION=us-east-1

      - name: Summary
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Service**: $ECS_SERVICE" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster**: $ECS_CLUSTER" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: ${{ steps.build-image.outputs.image }}" >> $GITHUB_STEP_SUMMARY
